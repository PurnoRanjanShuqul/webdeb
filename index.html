<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Stack Web Developer Roadmap & Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary: #06080f;
    --bg-secondary: #0d1117;
    --bg-glass: rgba(255,255,255,0.025);
    --bg-glass-hover: rgba(255,255,255,0.045);
    --border-glass: rgba(255,255,255,0.07);
    --border-glass-hover: rgba(255,255,255,0.14);
    --text-primary: #f0f2f5;
    --text-secondary: #9ca3af;
    --text-muted: #5c6370;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-pink: #ec4899;
    --phase-red: #ef4444;
    --phase-yellow: #eab308;
    --phase-green: #22c55e;
    --success: #10b981;
    --danger: #ef4444;
    --badge-easy: #10b981;
    --badge-medium: #f59e0b;
    --badge-hard: #ef4444;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    --font: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
    font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);
    line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
body::before{
    content:'';position:fixed;inset:0;
    background:
        radial-gradient(ellipse 80% 60% at 15% 50%,rgba(59,130,246,0.07),transparent),
        radial-gradient(ellipse 60% 50% at 85% 20%,rgba(139,92,246,0.06),transparent),
        radial-gradient(ellipse 70% 40% at 50% 90%,rgba(16,185,129,0.04),transparent);
    pointer-events:none;z-index:0;
}
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
#app{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:16px 16px 80px}
.header{text-align:center;padding:36px 16px 28px}
.header h1{
    font-size:clamp(22px,5vw,44px);font-weight:900;letter-spacing:-.5px;margin-bottom:6px;
    background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 40%,#ec4899 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{color:var(--text-secondary);font-size:clamp(13px,2.5vw,15px)}
.overall-progress{
    background:var(--bg-glass);backdrop-filter:blur(24px);
    border:1px solid var(--border-glass);border-radius:var(--radius-lg);
    padding:22px 24px;margin-bottom:20px;
}
.overall-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.overall-progress-header h3{font-size:15px;font-weight:600}
.overall-progress-header span{font-size:13px;font-weight:700;color:var(--accent-blue)}
.progress-bar-track{width:100%;height:10px;background:rgba(255,255,255,0.04);border-radius:999px;overflow:hidden}
.progress-bar-fill{
    height:100%;border-radius:999px;position:relative;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6,#ec4899);
    transition:width .6s cubic-bezier(.4,0,.2,1);
}
.progress-bar-fill::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
    animation:shimmer 2.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-card{
    background:var(--bg-glass);backdrop-filter:blur(24px);
    border:1px solid var(--border-glass);border-radius:var(--radius-lg);
    padding:18px 14px;text-align:center;transition:var(--transition);
}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border-glass-hover)}
.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800}
.stat-card.phase-stat{display:flex;flex-direction:column;align-items:center;gap:6px}
.circ-wrap{position:relative;width:64px;height:64px}
.circ-wrap svg{transform:rotate(-90deg);width:64px;height:64px}
.circ-bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5}
.circ-fg{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
.circ-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.toolbar{
    background:var(--bg-glass);backdrop-filter:blur(24px);
    border:1px solid var(--border-glass);border-radius:var(--radius-lg);
    padding:14px 18px;margin-bottom:28px;
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-input{
    width:100%;padding:9px 14px 9px 36px;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius-md);color:var(--text-primary);
    font-family:var(--font);font-size:13px;outline:none;transition:var(--transition);
}
.search-input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.search-input::placeholder{color:var(--text-muted)}
.filter-btns{display:flex;gap:5px}
.filter-btn{
    padding:7px 14px;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);
    background:transparent;color:var(--text-secondary);font-family:var(--font);
    font-size:12px;font-weight:500;cursor:pointer;transition:var(--transition);white-space:nowrap;
}
.filter-btn:hover{background:rgba(255,255,255,0.04);color:var(--text-primary)}
.filter-btn.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#fff}
.reset-btn{
    padding:7px 14px;border:1px solid rgba(239,68,68,.25);border-radius:var(--radius-sm);
    background:rgba(239,68,68,.08);color:#fca5a5;font-family:var(--font);
    font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;
}
.reset-btn:hover{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45)}
.phase-section{
    margin-bottom:28px;background:var(--bg-glass);backdrop-filter:blur(24px);
    border:1px solid var(--border-glass);border-radius:var(--radius-xl);overflow:hidden;
}
.phase-section.p-high{border-left:4px solid var(--phase-red)}
.phase-section.p-medium{border-left:4px solid var(--phase-yellow)}
.phase-section.p-low{border-left:4px solid var(--phase-green)}
.phase-hdr{
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 22px;cursor:pointer;user-select:none;transition:var(--transition);gap:12px;
}
.phase-hdr:hover{background:rgba(255,255,255,0.015)}
.phase-hdr-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.phase-badge{
    padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0;
}
.phase-badge.high{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.phase-badge.medium{background:rgba(234,179,8,.12);color:#fde047;border:1px solid rgba(234,179,8,.25)}
.phase-badge.low{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.25)}
.phase-title-wrap{min-width:0}
.phase-title{font-size:clamp(14px,3vw,18px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-sub{font-size:12px;color:var(--text-muted);font-weight:400}
.phase-hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.phase-prog{font-size:12px;font-weight:600;color:var(--text-secondary);white-space:nowrap}
.chevron{font-size:11px;color:var(--text-muted);transition:transform .3s ease;display:inline-block}
.chevron.shut{transform:rotate(-90deg)}
.phase-body{padding:0 22px 22px;overflow:hidden;transition:max-height .45s ease,padding .3s ease,opacity .3s ease;max-height:200000px;opacity:1}
.phase-body.shut{max-height:0!important;padding-top:0;padding-bottom:0;opacity:0}
.cat{margin-bottom:14px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:var(--radius-md);overflow:hidden}
.cat:last-child{margin-bottom:0}
.cat-hdr{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;cursor:pointer;user-select:none;transition:var(--transition);
}
.cat-hdr:hover{background:rgba(255,255,255,0.025)}
.cat-hdr-left{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;min-width:0}
.cat-emoji{font-size:17px;flex-shrink:0}
.cat-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.cat-prog{
    font-size:11px;font-weight:600;color:var(--text-muted);
    background:rgba(255,255,255,0.04);padding:2px 9px;border-radius:999px;
}
.cat-prog.done{background:rgba(16,185,129,.12);color:#6ee7b7}
.cat-body{padding:2px 6px 6px;max-height:200000px;overflow:hidden;transition:max-height .35s ease,opacity .25s ease,padding .25s ease;opacity:1}
.cat-body.shut{max-height:0;opacity:0;padding:0 6px}
.t-item{
    display:flex;flex-direction:column;gap:0;
    padding:0;border-radius:var(--radius-sm);transition:var(--transition);
}
.t-item.gone{display:none}
.t-row{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);
    transition:var(--transition);
}
.t-row:hover{background:rgba(255,255,255,0.025)}
.t-item.done .t-row{background:rgba(16,185,129,0.07)}
.t-item.done .t-name{text-decoration:line-through;color:var(--text-muted)}
.t-cb{
    appearance:none;-webkit-appearance:none;width:20px;height:20px;min-width:20px;
    border:2px solid rgba(255,255,255,0.18);border-radius:4px;cursor:pointer;
    transition:var(--transition);position:relative;background:transparent;flex-shrink:0;
}
.t-cb:checked{background:var(--success);border-color:var(--success)}
.t-cb:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.t-cb:hover{border-color:rgba(255,255,255,0.35)}
.t-label{flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;flex-wrap:wrap}
.t-name{font-size:13px;font-weight:500;color:var(--text-primary);transition:var(--transition)}
.t-meta{display:flex;align-items:center;gap:7px;margin-left:auto}
.diff{padding:1px 7px;border-radius:999px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.diff.easy{background:rgba(16,185,129,.12);color:#6ee7b7}
.diff.medium{background:rgba(245,158,11,.12);color:#fcd34d}
.diff.hard{background:rgba(239,68,68,.12);color:#fca5a5}
.t-time{font-size:10.5px;color:var(--text-muted);font-weight:500;white-space:nowrap}
.sub-toggle{
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.18);
    color:#c4b5fd;font-family:var(--font);font-size:10px;font-weight:600;
    padding:2px 8px;border-radius:999px;cursor:pointer;transition:var(--transition);
    white-space:nowrap;margin-left:4px;flex-shrink:0;
}
.sub-toggle:hover{background:rgba(139,92,246,0.16);border-color:rgba(139,92,246,0.3)}
.sub-toggle .arrow{display:inline-block;transition:transform .25s ease;font-size:8px}
.sub-toggle .arrow.open{transform:rotate(90deg)}
.sub-prog-pill{
    font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;
    background:rgba(255,255,255,0.04);color:var(--text-muted);margin-left:2px;
}
.sub-prog-pill.alldone{background:rgba(16,185,129,.15);color:#6ee7b7}
.subs-list{
    width:100%;padding:0 0 0 40px;
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .35s ease,opacity .25s ease,padding .2s ease;
}
.subs-list.open{max-height:200000px;opacity:1;padding:4px 0 8px 40px}
.sub-item{
    display:flex;align-items:center;gap:8px;
    padding:4px 10px;font-size:12px;color:var(--text-secondary);
    transition:var(--transition);border-radius:4px;cursor:pointer;user-select:none;
}
.sub-item:hover{color:var(--text-primary);background:rgba(255,255,255,0.025)}
.sub-item.sub-done{background:rgba(16,185,129,0.06)}
.sub-item.sub-done .sub-text{text-decoration:line-through;color:var(--text-muted)}
.sub-item.sub-done .sub-dot{background:var(--success)}
.sub-cb{
    appearance:none;-webkit-appearance:none;width:16px;height:16px;min-width:16px;
    border:2px solid rgba(255,255,255,0.14);border-radius:3px;cursor:pointer;
    transition:var(--transition);position:relative;background:transparent;flex-shrink:0;
}
.sub-cb:checked{background:var(--success);border-color:var(--success)}
.sub-cb:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700}
.sub-cb:hover{border-color:rgba(255,255,255,0.3)}
.sub-dot{
    width:5px;height:5px;min-width:5px;border-radius:50%;
    background:rgba(139,92,246,0.5);flex-shrink:0;display:none;
}
.sub-text{line-height:1.5;transition:var(--transition)}
.modal-ov{
    position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;z-index:1000;
    animation:fadeUp .2s ease;
}
.modal-box{
    background:#161b26;border:1px solid var(--border-glass);border-radius:var(--radius-lg);
    padding:30px 28px;max-width:380px;width:92%;text-align:center;
}
.modal-box h3{font-size:18px;margin-bottom:10px}
.modal-box p{color:var(--text-secondary);font-size:13px;margin-bottom:22px;line-height:1.5}
.modal-btns{display:flex;gap:10px;justify-content:center}
.m-btn{
    padding:9px 22px;border-radius:var(--radius-sm);border:none;
    font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);
}
.m-btn.cancel{background:rgba(255,255,255,0.08);color:var(--text-primary)}
.m-btn.cancel:hover{background:rgba(255,255,255,0.14)}
.m-btn.confirm{background:var(--danger);color:#fff}
.m-btn.confirm:hover{background:#dc2626}
.no-res{text-align:center;padding:48px 20px;color:var(--text-muted)}
.no-res .big{font-size:44px;display:block;margin-bottom:10px}
.no-res p{font-size:15px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.phase-section{animation:fadeUp .45s ease both}
.phase-section:nth-child(2){animation-delay:.08s}
.phase-section:nth-child(3){animation-delay:.16s}
body.loaded .phase-section{animation:none}
@media(max-width:768px){
    #app{padding:10px 10px 60px}
    .header{padding:24px 10px 18px}
    .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
    .toolbar{padding:10px 12px}
    .search-wrap{min-width:100%}
    .filter-btns{width:100%;justify-content:center}
    .phase-hdr{padding:14px 14px}
    .phase-body{padding:0 14px 14px}
    .phase-body.shut{padding:0}
    .t-label{flex-direction:column;align-items:flex-start;gap:4px}
    .t-meta{margin-left:0}
    .stat-card{padding:12px 8px}
    .stat-value{font-size:20px}
    .circ-wrap,.circ-wrap svg{width:54px;height:54px}
    .circ-pct{font-size:11px}
    .overall-progress{padding:16px}
    .subs-list,.subs-list.open{padding-left:30px}
}
@media(max-width:480px){
    .stats-grid{grid-template-columns:1fr 1fr}
    .filter-btn{padding:6px 10px;font-size:11px}
    .phase-title{font-size:13px}
    .phase-badge{font-size:9px;padding:2px 7px}
    .cat-hdr-left{font-size:12.5px}
    .t-name{font-size:12px}
    .phase-hdr{flex-wrap:wrap}
    .subs-list,.subs-list.open{padding-left:20px}
}
</style>
</head>

      {id:'p3_cs2',name:'OOP Concepts',difficulty:'Medium',time:'1-2 weeks',subs:[{id:'p3_cs2_s1',text:'Classes & objects'},{id:'p3_cs2_s2',text:'Constructor functions'},{id:'p3_cs2_s3',text:'Encapsulation (public, private, protected)'},{id:'p3_cs2_s4',text:'Inheritance (extends, super)'},{id:'p3_cs2_s5',text:'Polymorphism (method overriding)'},{id:'p3_cs2_s6',text:'Abstraction'},{id:'p3_cs2_s7',text:'SOLID principles overview'},{id:'p3_cs2_s8',text:'Composition vs inheritance'},{id:'p3_cs2_s9',text:'Getters & setters'},{id:'p3_cs2_s10',text:'Static methods & properties'},{id:'p3_cs2_s11',text:'Design patterns using OOP'},{id:'p3_cs2_s12',text:'OOP in JavaScript & TypeScript'}]},

      {id:'p3_cs6',name:'Software Engineering Principles (SOLID, DRY, KISS)',difficulty:'Medium',time:'1 week',subs:[{id:'p3_cs6_s1',text:'Single Responsibility Principle (S)'},{id:'p3_cs6_s2',text:'Open/Closed Principle (O)'},{id:'p3_cs6_s3',text:'Liskov Substitution Principle (L)'},{id:'p3_cs6_s4',text:'Interface Segregation Principle (I)'},{id:'p3_cs6_s5',text:'Dependency Inversion Principle (D)'},{id:'p3_cs6_s6',text:'DRY — Don\'t Repeat Yourself'},{id:'p3_cs6_s7',text:'KISS — Keep It Simple, Stupid'},{id:'p3_cs6_s8',text:'YAGNI — You Aren\'t Gonna Need It'},{id:'p3_cs6_s9',text:'Separation of Concerns'},{id:'p3_cs6_s10',text:'Clean Code principles'},{id:'p3_cs6_s11',text:'Code review best practices'},{id:'p3_cs6_s12',text:'Refactoring techniques'},{id:'p3_cs6_s13',text:'Technical debt management'}]},
      {id:'p3_cs7',name:'Agile / Scrum methodology',difficulty:'Easy',time:'3-5 days',subs:[{id:'p3_cs7_s1',text:'Agile Manifesto & principles'},{id:'p3_cs7_s2',text:'Scrum framework overview'},{id:'p3_cs7_s3',text:'Roles: Product Owner, Scrum Master, Dev Team'},{id:'p3_cs7_s4',text:'Sprint planning meeting'},{id:'p3_cs7_s5',text:'Daily standup (daily scrum)'},{id:'p3_cs7_s6',text:'Sprint review / demo'},{id:'p3_cs7_s7',text:'Sprint retrospective'},{id:'p3_cs7_s8',text:'User stories & acceptance criteria'},{id:'p3_cs7_s9',text:'Product backlog & sprint backlog'},{id:'p3_cs7_s10',text:'Story points & estimation'},{id:'p3_cs7_s11',text:'Kanban board & WIP limits'},{id:'p3_cs7_s12',text:'Velocity & burndown charts'},{id:'p3_cs7_s13',text:'Agile tools (Jira, Trello, Linear)'}]}
    ]}

];

// ===== STATE =====
let completed=new Set(JSON.parse(localStorage.getItem('roadmap_done')||'[]'));
let subCompleted=new Set(JSON.parse(localStorage.getItem('roadmap_sub_done')||'[]'));
let filter='all';
let query='';
let shutPhases=new Set();
let shutCats=new Set();
let openSubs=new Set();

// ===== HELPERS =====
const save=()=>{
    localStorage.setItem('roadmap_done',JSON.stringify([...completed]));
    localStorage.setItem('roadmap_sub_done',JSON.stringify([...subCompleted]));
};
const allTopics=()=>{const t=[];ROADMAP.forEach(p=>p.categories.forEach(c=>c.topics.forEach(x=>t.push(x))));return t};
const phaseStats=id=>{let t=0,d=0;ROADMAP.find(p=>p.id===id).categories.forEach(c=>c.topics.forEach(x=>{t++;if(completed.has(x.id))d++}));return{t,d,pct:t?Math.round(d/t*100):0}};
const catStats=c=>{const t=c.topics.length,d=c.topics.filter(x=>completed.has(x.id)).length;return{t,d,pct:t?Math.round(d/t*100):0}};
const overallStats=()=>{const a=allTopics(),t=a.length,d=a.filter(x=>completed.has(x.id)).length;return{t,d,pct:t?Math.round(d/t*100):0}};
const subStats=(subs)=>{if(!subs||!subs.length)return{t:0,d:0};const t=subs.length,d=subs.filter(s=>subCompleted.has(s.id)).length;return{t,d}};
const visible=topic=>{
    const done=completed.has(topic.id);
    const fOk=filter==='all'||(filter==='completed'&&done)||(filter==='incomplete'&&!done);
    const sOk=!query||topic.name.toLowerCase().includes(query.toLowerCase())||
              (topic.subs&&topic.subs.some(s=>s.text.toLowerCase().includes(query.toLowerCase())));
    return fOk&&sOk;
};
function circSvg(pct,color,sz=64){
    const r=sz/2-5,c=2*Math.PI*r,off=c-(c*pct/100);
    return `<div class="circ-wrap" style="width:${sz}px;height:${sz}px">
      <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
        <circle class="circ-bg" cx="${sz/2}" cy="${sz/2}" r="${r}"/>
        <circle class="circ-fg" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
      </svg><span class="circ-pct" style="color:${color}">${pct}%</span></div>`;
}

// ===== RENDER =====
function render(){
    const scrollY=window.scrollY;
    const wasFocus=document.activeElement&&document.activeElement.classList.contains('search-input');
    const cursor=wasFocus?document.activeElement.selectionStart:0;

    const ov=overallStats();
    const s1=phaseStats('phase1'),s2=phaseStats('phase2'),s3=phaseStats('phase3');

    let h=`<header class="header"><h1>Full Stack Web Developer Roadmap</h1>
      <p>Track your journey from zero to senior developer · ${ov.t} topics to master</p></header>
      <div class="overall-progress"><div class="overall-progress-header">
        <h3>📊 Overall Progress</h3><span>${ov.d} / ${ov.t} topics · ${ov.pct}%</span></div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${ov.pct}%"></div></div></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Topics</div><div class="stat-value">${ov.t}</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" style="color:var(--success)">${ov.d}</div></div>
        <div class="stat-card phase-stat"><div class="stat-label">🚀 Phase 1</div>${circSvg(s1.pct,'#ef4444')}<div style="font-size:10px;color:var(--text-muted)">${s1.d}/${s1.t}</div></div>
        <div class="stat-card phase-stat"><div class="stat-label">💼 Phase 2</div>${circSvg(s2.pct,'#eab308')}<div style="font-size:10px;color:var(--text-muted)">${s2.d}/${s2.t}</div></div>
        <div class="stat-card phase-stat"><div class="stat-label">🎓 Phase 3</div>${circSvg(s3.pct,'#22c55e')}<div style="font-size:10px;color:var(--text-muted)">${s3.d}/${s3.t}</div></div>
      </div>
      <div class="toolbar">
        <div class="search-wrap"><input type="text" class="search-input" placeholder="Search topics & subtopics…" value="${escHtml(query)}"></div>
        <div class="filter-btns">
          <button class="filter-btn ${filter==='all'?'active':''}" data-f="all">All</button>
          <button class="filter-btn ${filter==='completed'?'active':''}" data-f="completed">✅ Done</button>
          <button class="filter-btn ${filter==='incomplete'?'active':''}" data-f="incomplete">⬜ Todo</button>
        </div>
        <button class="reset-btn">🔄 Reset</button>
      </div><div class="phases-wrap">`;

    let anyVis=false;
    ROADMAP.forEach(phase=>{
        const st=phaseStats(phase.id);
        const pShut=shutPhases.has(phase.id);
        let phaseVis=false;
        phase.categories.forEach(c=>c.topics.forEach(t=>{if(visible(t))phaseVis=true}));
        if(!phaseVis&&(query||filter!=='all'))return;
        if(phaseVis)anyVis=true;

        h+=`<div class="phase-section p-${phase.priority}">
          <div class="phase-hdr" data-pid="${phase.id}">
            <div class="phase-hdr-left">
              <span class="phase-badge ${phase.priority}">${phase.priorityLabel}</span>
              <div class="phase-title-wrap">
                <div class="phase-title">${phase.emoji} ${phase.title}</div>
                <div class="phase-sub">${phase.subtitle}</div>
              </div>
            </div>
            <div class="phase-hdr-right">
              <span class="phase-prog">${st.d}/${st.t} · ${st.pct}%</span>
              <span class="chevron ${pShut?'shut':''}">▼</span>
            </div>
          </div>
          <div class="phase-body ${pShut?'shut':''}">`;

        phase.categories.forEach((cat,ci)=>{
            const cs=catStats(cat);
            const cid=phase.id+'_c'+ci;
            const cShut=shutCats.has(cid);
            const visTops=cat.topics.filter(t=>visible(t));
            if(visTops.length===0&&(query||filter!=='all'))return;
            const allDone=cs.d===cs.t&&cs.t>0;

            h+=`<div class="cat">
              <div class="cat-hdr" data-cid="${cid}">
                <div class="cat-hdr-left"><span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span></div>
                <div class="cat-hdr-right">
                  <span class="cat-prog ${allDone?'done':''}">${cs.d}/${cs.t}</span>
                  <span class="chevron ${cShut?'shut':''}">▼</span>
                </div>
              </div>
              <div class="cat-body ${cShut?'shut':''}">`;

            cat.topics.forEach(t=>{
                const isDone=completed.has(t.id);
                const show=visible(t);
                const isOpen=openSubs.has(t.id);
                const subCount=t.subs?t.subs.length:0;
                const ss=subStats(t.subs);
                const subAllDone=ss.t>0&&ss.d===ss.t;
                h+=`<div class="t-item ${isDone?'done':''} ${show?'':'gone'}">
                  <div class="t-row">
                    <input type="checkbox" class="t-cb" id="${t.id}" data-tid="${t.id}" ${isDone?'checked':''}>
                    <label for="${t.id}" class="t-label">
                      <span class="t-name">${t.name}</span>
                      <div class="t-meta">`;
                if(subCount>0){
                    h+=`<button class="sub-toggle" data-sid="${t.id}"><span class="arrow ${isOpen?'open':''}">▶</span> ${subCount} sub-topics</button>`;
                    h+=`<span class="sub-prog-pill ${subAllDone?'alldone':''}">${ss.d}/${ss.t}</span>`;
                }
                h+=`      <span class="diff ${t.difficulty.toLowerCase()}">${t.difficulty}</span>
                        <span class="t-time">⏱ ${t.time}</span>
                      </div>
                    </label>
                  </div>`;
                if(subCount>0){
                    h+=`<div class="subs-list ${isOpen?'open':''}">`;
                    t.subs.forEach(s=>{
                        const sDone=subCompleted.has(s.id);
                        h+=`<div class="sub-item ${sDone?'sub-done':''}">
                          <input type="checkbox" class="sub-cb" data-subid="${s.id}" ${sDone?'checked':''}>
                          <span class="sub-text">${s.text}</span>
                        </div>`;
                    });
                    h+=`</div>`;
                }
                h+=`</div>`;
            });
            h+=`</div></div>`;
        });
        h+=`</div></div>`;
    });

    if(!anyVis)h+=`<div class="no-res"><span class="big">🔍</span><p>No topics match your search or filter.</p></div>`;
    h+=`</div>`;

    document.getElementById('app').innerHTML=h;
    window.scrollTo(0,scrollY);
    if(wasFocus){
        const inp=document.querySelector('.search-input');
        if(inp){inp.focus();inp.setSelectionRange(cursor,cursor)}
    }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===== RESET MODAL =====
function showReset(){
    const ov=document.createElement('div');
    ov.className='modal-ov';
    ov.innerHTML=`<div class="modal-box">
      <h3>⚠️ Reset All Progress?</h3>
      <p>This will uncheck all <strong>${completed.size}</strong> completed topics and <strong>${subCompleted.size}</strong> completed sub-topics. This cannot be undone.</p>
      <div class="modal-btns">
        <button class="m-btn cancel" data-act="cancel">Cancel</button>
        <button class="m-btn confirm" data-act="confirm">Reset Everything</button>
      </div></div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click',e=>{
        if(e.target.dataset.act==='cancel'||e.target===ov)ov.remove();
        if(e.target.dataset.act==='confirm'){completed.clear();subCompleted.clear();save();ov.remove();render()}
    });
}

// ===== EVENT DELEGATION =====
const app=document.getElementById('app');

app.addEventListener('change',e=>{
    if(e.target.classList.contains('t-cb')){
        const tid=e.target.dataset.tid;
        e.target.checked?completed.add(tid):completed.delete(tid);
        // Auto-mark all subtopics when main topic is checked
        const topic=allTopics().find(t=>t.id===tid);
        if(topic&&topic.subs){
            topic.subs.forEach(s=>{
                e.target.checked?subCompleted.add(s.id):subCompleted.delete(s.id);
            });
        }
        save();render();
    }
    if(e.target.classList.contains('sub-cb')){
        const sid=e.target.dataset.subid;
        e.target.checked?subCompleted.add(sid):subCompleted.delete(sid);
        // Auto-check parent topic if all subs are done
        const parentTopic=allTopics().find(t=>t.subs&&t.subs.some(s=>s.id===sid));
        if(parentTopic){
            const allSubsDone=parentTopic.subs.every(s=>subCompleted.has(s.id));
            if(allSubsDone){completed.add(parentTopic.id)}
            else{completed.delete(parentTopic.id)}
        }
        save();render();
    }
});

app.addEventListener('click',e=>{
    const ph=e.target.closest('.phase-hdr');
    if(ph){const id=ph.dataset.pid;shutPhases.has(id)?shutPhases.delete(id):shutPhases.add(id);render();return}
    const ch=e.target.closest('.cat-hdr');
    if(ch){const id=ch.dataset.cid;shutCats.has(id)?shutCats.delete(id):shutCats.add(id);render();return}
    const st=e.target.closest('.sub-toggle');
    if(st){e.preventDefault();e.stopPropagation();const id=st.dataset.sid;openSubs.has(id)?openSubs.delete(id):openSubs.add(id);render();return}
    const fb=e.target.closest('.filter-btn');
    if(fb){filter=fb.dataset.f;render();return}
    if(e.target.closest('.reset-btn')){showReset();return}
});

app.addEventListener('input',e=>{
    if(e.target.classList.contains('search-input')){query=e.target.value;render()}
});

// ===== INIT =====
render();
setTimeout(()=>document.body.classList.add('loaded'),600);
</script>
